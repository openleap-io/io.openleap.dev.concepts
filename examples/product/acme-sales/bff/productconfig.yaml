# Example — ACME Sales Workbench: BFF runtime configuration
# Template: templates/product/prod/bff/productconfig.yaml (TPL-PROD-BFF-PCFG v1.0.0)
#
# This file is normally generated by the packaging step in CI
# from product.yaml, features/selection.uvl, variability/bindings.yaml,
# and extensions/*. The example below shows the shape a reviewer
# should expect to see in a release PR.

apiVersion: openleap.io/product-spec/v1
kind: BffProductConfig

metadata:
  product: acme-sales
  productVersion: "0.3.0"
  generatedAt: "2026-04-18T10:12:00Z"
  catalogRef: "v2026.04.0"
  deploymentModel: "per-product"

features:

  - id: F-SD-001
    mode: "full"
    aggregatedServices:
      - service: "sd-ord-svc"
        endpoint: "POST /api/v1/sd/ord/orders"
        tier: "T3"
        isMutation: true
        failureMode: "fail"
      - service: "bp-svc"
        endpoint: "GET /api/v1/bp/parties/{id}"
        tier: "T2"
        isMutation: false
        failureMode: "retry"
    viewModelKey: "SalesOrderView"
    bindings:
      approval.requireComment:
        value: true
        bindingTime: "deploy"
      pricing.roundingMode:
        value: "HALF_UP"
        bindingTime: "compile"

  - id: F-SD-001-02
    mode: "full"
    aggregatedServices:
      - service: "sd-ord-svc"
        endpoint: "POST /api/v1/sd/ord/orders/draft"
        tier: "T3"
        isMutation: true
        failureMode: "fail"
    viewModelKey: "SalesOrderCreateView"
    bindings:
      form.sections.visibleByDefault:
        value: ["header", "items", "pricing", "extensions"]
        bindingTime: "deploy"

  - id: F-SD-001-03-01
    mode: "full"
    aggregatedServices:
      - service: "sd-ord-svc"
        endpoint: "GET /api/v1/sd/ord/orders/{id}"
        tier: "T3"
        isMutation: false
        failureMode: "fail"
    viewModelKey: "SalesOrderDetailView"

  - id: F-BP-001
    mode: "full"
    aggregatedServices:
      - service: "bp-svc"
        endpoint: "GET /api/v1/bp/parties"
        tier: "T2"
        isMutation: false
        failureMode: "retry"
    viewModelKey: "PartySearchView"
    bindings:
      search.minCharacters:
        value: 3
        bindingTime: "runtime"

  - id: F-BP-001-02
    mode: "full"
    aggregatedServices:
      - service: "bp-svc"
        endpoint: "GET /api/v1/bp/parties/{id}"
        tier: "T2"
        isMutation: false
        failureMode: "retry"
    viewModelKey: "PartyDetailView"

  # Cross-suite read-only inclusions (sple-platform-concept.md §5)
  - id: F-PPS-010
    mode: "read-only"
    aggregatedServices:
      - service: "pps-im-svc"
        endpoint: "GET /api/v1/pps/im/stock"
        tier: "T3"
        isMutation: false
        failureMode: "degrade"
    viewModelKey: "StockReadView"
    bindings:
      pagination.pageSize:
        value: 25
        bindingTime: "runtime"
    writeBlockResponse:
      status: 403
      code: "FEATURE_READ_ONLY"

  - id: F-FI-007
    mode: "read-only"
    aggregatedServices:
      - service: "fi-ar-svc"
        endpoint: "GET /api/v1/fi/ar/invoices"
        tier: "T3"
        isMutation: false
        failureMode: "degrade"
    viewModelKey: "InvoicePreviewView"
    writeBlockResponse:
      status: 403
      code: "FEATURE_READ_ONLY"

  - id: F-FI-002-01
    mode: "embedded"
    aggregatedServices:
      - service: "fi-ar-svc"
        endpoint: "GET /api/v1/fi/ar/invoices/{id}/summary"
        tier: "T3"
        isMutation: false
        failureMode: "degrade"
    viewModelKey: "InvoiceSummaryEmbedView"

excluded:
  - id: F-SD-002-01
    reason: "ACME uses central pricing (decision PD-003)."
  - id: F-SD-001-03-02
    reason: "Every persona has write access; read-only variant not needed."

extensionRoutes:

  - featureId: F-SD-001
    extensionPointId: "ext.orderCreate.customFields"
    kind: "fields"
    target:
      type: "custom-service"
      service: "cs-acme-order-fields"
      endpoint: "/api/extensions/orders/fields"
      timeoutMs: 2000
      failureMode: "degrade"

  - featureId: F-SD-001
    extensionPointId: "ext.orderCreate.rules.validation"
    kind: "rules"
    target:
      type: "inline"            # rules are evaluated by the BFF itself

  - featureId: F-SD-001
    extensionPointId: "ext.orderCreate.actions.toolbar"
    kind: "actions"
    target:
      type: "custom-service"
      service: "cs-acme-legacy-export"
      endpoint: "POST /api/extensions/orders/export"
      timeoutMs: 5000
      failureMode: "toast-error"

  - featureId: F-SD-001
    extensionPointId: "ext.orderCreate.actions.rowMenu"
    kind: "actions"
    target:
      type: "custom-service"
      service: "cs-acme-order-duplicator"
      endpoint: "POST /api/extensions/orders/duplicate"
      timeoutMs: 3000
      failureMode: "toast-error"

personas:
  - id: sales-rep
    iamRoles: ["SD_USER", "BP_READER"]
  - id: sales-manager
    iamRoles: ["SD_MANAGER", "SD_USER", "BP_READER", "FI_VIEWER"]

globals:
  locale: "de-DE"
  currency: "EUR"
  timezone: "Europe/Berlin"

validation:
  decomposeVersion: "1.4.2"
  inputDigest: "sha256:3c4b9f1a0e2d6f7a8b5c3d2e1f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a"
  status: "valid"
